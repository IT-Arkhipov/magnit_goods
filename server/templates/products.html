{% extends "base.html" %}

{% block title %}Товары - Магнит Goods{% endblock %}

{% block content %}
<div class="card">
    <h2>Товары</h2>

    <div class="form-row">
        <div class="form-group">
            <label>Код магазина</label>
            <input type="text" id="storeCode" placeholder="Например: 12345" value="{{ store_code or '' }}">
        </div>
        <div class="form-group">
            <label>Категория</label>
            <select id="categoryFilter">
                <option value="">Все категории</option>
            </select>
        </div>
        <div class="form-group">
            <label>Поиск</label>
            <input type="text" id="searchFilter" placeholder="Название товара">
        </div>
        <div class="form-group">
            <label>Сортировка</label>
            <select id="sortFilter">
                <option value="name">По названию</option>
                <option value="price">По цене</option>
                <option value="discount">По скидке</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="loadProducts()">Загрузить</button>
    </div>
</div>

<div class="card">
    <div id="products-list">
        <p style="color: #666;">Нажмите "Загрузить" для отображения товаров</p>
    </div>
</div>

<!-- Модальное окно для истории цен -->
<div id="priceHistoryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <h2 id="modalTitle">История цен</h2>
        <div id="modalContent"></div>
        <button class="btn btn-danger" onclick="closeModal()" style="margin-top: 16px;">Закрыть</button>
    </div>
</div>

<script>
async function loadProducts() {
    const storeCode = document.getElementById('storeCode').value;
    const category = document.getElementById('categoryFilter').value;
    const search = document.getElementById('searchFilter').value;
    const sort = document.getElementById('sortFilter').value;

    if (!storeCode) {
        alert('Укажите код магазина');
        return;
    }

    const listDiv = document.getElementById('products-list');
    listDiv.innerHTML = '<p style="color: #666;">Загрузка...</p>';

    try {
        let url = `/api/products?store_code=${encodeURIComponent(storeCode)}&sort_by=${sort}&limit=100`;
        if (category) url += `&category_id=${category}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const response = await fetch(url);
        const products = await response.json();

        if (products.length === 0) {
            listDiv.innerHTML = '<p style="color: #666;">Товары не найдены</p>';
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Цена</th>
                        <th>Старая цена</th>
                        <th>Скидка</th>
                        <th>Наличие</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
        `;

        products.forEach(p => {
            html += `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td><span class="price-current">${p.price} ₽</span></td>
                    <td>${p.old_price ? `<span class="price-old">${p.old_price} ₽</span>` : '-'}</td>
                    <td>${p.discount_percent ? `<span class="discount-badge">-${p.discount_percent}%</span>` : '-'}</td>
                    <td>${p.in_stock ? '<span class="badge badge-success">В наличии</span>' : '<span class="badge badge-danger">Нет</span>'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="showPriceHistory(${p.product_id})">История цен</button>
                    </td>
                </tr>
            `;
        });

        html += '</tbody></table>';
        listDiv.innerHTML = html;
    } catch (e) {
        listDiv.innerHTML = `<p style="color: #dc3545;">Ошибка загрузки: ${e.message}</p>`;
    }
}

async function loadCategories() {
    const storeCode = document.getElementById('storeCode').value;
    if (!storeCode) return;

    try {
        const response = await fetch(`/api/categories?store_code=${encodeURIComponent(storeCode)}`);
        const categories = await response.json();

        const select = document.getElementById('categoryFilter');
        select.innerHTML = '<option value="">Все категории</option>';
        categories.forEach(cat => {
            select.innerHTML += `<option value="${cat.id}">${cat.name} (${cat.product_count || 0})</option>`;
        });
    } catch (e) {
        console.error('Ошибка загрузки категорий:', e);
    }
}

async function showPriceHistory(productId) {
    const storeCode = document.getElementById('storeCode').value;
    const modal = document.getElementById('priceHistoryModal');
    const content = document.getElementById('modalContent');
    const title = document.getElementById('modalTitle');

    modal.style.display = 'flex';
    content.innerHTML = '<p>Загрузка...</p>';

    try {
        const response = await fetch(`/api/prices/history/${productId}?store_code=${encodeURIComponent(storeCode)}&days=30`);
        const data = await response.json();

        title.textContent = data.product || 'История цен';

        let html = `
            <div style="margin-bottom: 16px;">
                <span class="badge badge-info">Текущая цена: <strong>${data.current_price} ₽</strong></span>
                <span class="badge badge-success">Мин: ${data.min_price} ₽</span>
                <span class="badge badge-danger">Макс: ${data.max_price} ₽</span>
                <span class="badge badge-warning">Средняя: ${data.avg_price} ₽</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Цена</th>
                        <th>Изменение</th>
                    </tr>
                </thead>
                <tbody>
        `;

        data.history.forEach(h => {
            const changeBadge = h.change_type === 'decreased' ? 'badge-success' :
                               h.change_type === 'increased' ? 'badge-danger' : 'badge-info';
            const changeText = h.change_type === 'decreased' ? '↓ Снижена' :
                              h.change_type === 'increased' ? '↑ Повышена' : '→ Без изменений';

            html += `
                <tr>
                    <td>${new Date(h.date).toLocaleDateString()}</td>
                    <td><strong>${h.price} ₽</strong></td>
                    <td><span class="badge ${changeBadge}">${changeText}</span></td>
                </tr>
            `;
        });

        html += '</tbody></table>';
        content.innerHTML = html;
    } catch (e) {
        content.innerHTML = `<p style="color: #dc3545;">Ошибка: ${e.message}</p>`;
    }
}

function closeModal() {
    document.getElementById('priceHistoryModal').style.display = 'none';
}

document.getElementById('storeCode').addEventListener('change', loadCategories);
</script>
{% endblock %}
