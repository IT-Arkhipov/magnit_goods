{% extends "base.html" %}
{% block title %}Магазины — Магнит Goods{% endblock %}

{% block content %}
<!-- Сканирование по адресу -->
<div class="card">
    <h2>Сканировать магазины по адресу</h2>
    <p style="color:#666;margin-bottom:12px;">Введите город и улицу. Сервер найдёт все магазины через API Магнита и добавит в базу.</p>
    <div class="form-row">
        <div class="form-group">
            <label>Город</label>
            <input type="text" id="scan-city" placeholder="Новочебоксарск" style="width:180px">
        </div>
        <div class="form-group">
            <label>Улица (опционально)</label>
            <input type="text" id="scan-street" placeholder="ул. Строителей" style="width:180px">
        </div>
        <div class="form-group">
            <label>Типы магазинов</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
                <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" class="scan-type-cb" value="Магнит" checked> Магнит
                </label>
                <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" class="scan-type-cb" value="Мини" checked> Мини
                </label>
                <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" class="scan-type-cb" value="Семейный" checked> Семейный
                </label>
                <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" class="scan-type-cb" value="Экстра" checked> Экстра
                </label>
                <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" class="scan-type-cb" value="Моя цена" checked> Моя цена
                </label>
            </div>
        </div>
        <div class="form-group" style="align-self:end;">
            <button class="btn btn-success" onclick="scanByAddress()">Сканировать</button>
        </div>
    </div>
    <div id="scan-address-status" style="margin-top:12px;"></div>
</div>

<!-- Список магазинов -->
<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0;">Список магазинов</h2>
        <button id="delete-selected-btn" class="btn btn-danger" style="display:none;" onclick="deleteSelectedStores()">
            Удалить выбранные (<span id="selected-count">0</span>)
        </button>
    </div>
    <div id="stores-table" style="max-height:480px;overflow-y:auto;">
        {% include "stores_table.html" %}
    </div>
</div>

<script>
// === Чекбоксы и массовое удаление ===
function toggleAllStores(checked) {
    document.querySelectorAll('.store-checkbox').forEach(cb => cb.checked = checked);
    updateDeleteButton();
}

function updateDeleteButton() {
    const checked = document.querySelectorAll('.store-checkbox:checked');
    const btn = document.getElementById('delete-selected-btn');
    const count = document.getElementById('selected-count');
    
    if (checked.length > 0) {
        btn.style.display = 'inline-block';
        count.textContent = checked.length;
    } else {
        btn.style.display = 'none';
    }
}

async function deleteSelectedStores() {
    const checked = document.querySelectorAll('.store-checkbox:checked');
    const ids = Array.from(checked).map(cb => cb.value);
    
    if (ids.length === 0) return;
    if (!confirm(`Удалить ${ids.length} магазин(ов)?`)) return;
    
    try {
        const resp = await fetch('/api/stores/delete-batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids }),
        });
        if (resp.ok) {
            filterStores();
        } else {
            const data = await resp.json();
            alert('Ошибка: ' + (data.detail || 'Не удалось удалить'));
        }
    } catch (e) {
        alert('Ошибка: ' + e.message);
    }
}

// === Сканирование по адресу ===
async function scanByAddress() {
    const city = document.getElementById('scan-city').value.trim();
    const street = document.getElementById('scan-street').value.trim();
    const statusDiv = document.getElementById('scan-address-status');

    if (!city) {
        alert('Введите город');
        return;
    }

    // Собираем выбранные типы
    const typeCheckboxes = document.querySelectorAll('.scan-type-cb:checked');
    const storeTypes = Array.from(typeCheckboxes).map(cb => cb.value);

    if (storeTypes.length === 0) {
        alert('Выберите хотя бы один тип магазина');
        return;
    }

    statusDiv.innerHTML = '<div class="badge badge-info">Запуск сканирования...</div>';

    try {
        const resp = await fetch('/api/stores/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                city: city,
                street: street || null,
                store_types: storeTypes,
                force_update: false,
            }),
        });
        const data = await resp.json();

        if (data.job_id) {
            statusDiv.innerHTML = `
                <div class="badge badge-info">Задание #${data.job_id} запущено</div>
                <div id="scan-address-progress" style="margin-top:8px;"></div>
            `;
            pollJobStatus(data.job_id, 'scan-address-progress', true);
        } else if (data.detail) {
            statusDiv.innerHTML = `<div class="badge badge-danger">Ошибка: ${data.detail}</div>`;
        }
    } catch (e) {
        statusDiv.innerHTML = `<div class="badge badge-danger">Ошибка: ${e.message}</div>`;
    }
}

// === Проверка статуса заданий ===
async function pollJobStatus(jobId, progressDivId, refreshTable) {
    const progressDiv = document.getElementById(progressDivId);

    const checkStatus = async () => {
        try {
            const resp = await fetch(`/api/jobs/${jobId}`);
            const job = await resp.json();

            if (job.status === 'running' || job.status === 'pending') {
                if (progressDiv) {
                    progressDiv.innerHTML = `
                        <div class="progress-bar" style="margin:8px 0;">
                            <div class="progress-bar-fill" style="width: ${job.progress}%"></div>
                        </div>
                        <small>${job.progress_message || 'Выполняется...'} (${job.progress}%)</small>
                    `;
                }
                setTimeout(checkStatus, 2000);
            } else if (job.status === 'completed') {
                if (progressDiv) {
                    progressDiv.innerHTML = `
                        <div class="badge badge-success">
                            ✓ Завершено! ${job.progress_message || `Просканировано: ${job.items_scanned}, Добавлено: ${job.items_added}`}
                        </div>
                    `;
                }
                if (refreshTable) filterStores();
            } else if (job.status === 'failed') {
                if (progressDiv) {
                    progressDiv.innerHTML = `<div class="badge badge-danger">✗ Ошибка: ${job.error_message}</div>`;
                }
            }
        } catch (e) {
            console.error('Ошибка проверки статуса:', e);
        }
    };

    checkStatus();
}

// === Загрузка и отображение ===
async function filterStores() {
    const resp = await fetch('/api/stores');
    const stores = await resp.json();
    renderTable(stores);
}

function renderTable(stores) {
    // Сортировка по адресу
    stores.sort((a, b) => (a.full_address || '').localeCompare(b.full_address || '', 'ru'));

    const container = document.getElementById('stores-table');
    if (stores.length === 0) {
        container.innerHTML = '<p>Магазины не найдены</p>';
        document.getElementById('delete-selected-btn').style.display = 'none';
        return;
    }
    let html = `<table>
        <thead><tr>
            <th style="width:40px;"><input type="checkbox" id="select-all-stores" onchange="toggleAllStores(this.checked)"></th>
            <th>Тип</th><th>Город</th><th>Адрес</th><th>Код</th><th>Действия</th>
        </tr></thead><tbody>`;
    for (const s of stores) {
        html += `<tr>
            <td><input type="checkbox" class="store-checkbox" value="${s.id}" onchange="updateDeleteButton()"></td>
            <td><span class="badge badge-info">${s.store_type}</span></td>
            <td>${s.city}</td>
            <td>${s.full_address}</td>
            <td><code>${s.store_code}</code></td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteStore('${s.id}')">Удалить</button>
            </td>
        </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
    updateDeleteButton();
}

async function deleteStore(id) {
    if (!confirm('Удалить магазин?')) return;
    await fetch(`/api/stores/${id}`, { method: 'DELETE' });
    filterStores();
}
</script>
{% endblock %}
